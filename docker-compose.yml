services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pulseroad
      MYSQL_USER: pulseroad
      MYSQL_PASSWORD: pulseroad
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-upulseroad", "-ppulseroad", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: golang:1.25
    working_dir: /app
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      GOPROXY: https://mirrors.aliyun.com/goproxy/,direct
      PULSEROAD_APP_ENV: development
      PULSEROAD_MYSQL_DSN: pulseroad:pulseroad@tcp(mysql:3306)/pulseroad?charset=utf8mb4&parseTime=True&loc=Local
      PULSEROAD_REDIS_ADDR: redis:6379
      PULSEROAD_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: go run ./cmd/migrate

  api:
    image: golang:1.25
    working_dir: /app
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      GOPROXY: https://mirrors.aliyun.com/goproxy/,direct
      PULSEROAD_APP_ENV: development
      PULSEROAD_SERVER_PORT: "8080"
      PULSEROAD_MYSQL_DSN: pulseroad:pulseroad@tcp(mysql:3306)/pulseroad?charset=utf8mb4&parseTime=True&loc=Local
      PULSEROAD_REDIS_ADDR: redis:6379
      PULSEROAD_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: go run ./cmd/api

  worker:
    image: golang:1.25
    working_dir: /app
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      GOPROXY: https://mirrors.aliyun.com/goproxy/,direct
      PULSEROAD_APP_ENV: development
      PULSEROAD_MYSQL_DSN: pulseroad:pulseroad@tcp(mysql:3306)/pulseroad?charset=utf8mb4&parseTime=True&loc=Local
      PULSEROAD_REDIS_ADDR: redis:6379
      PULSEROAD_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: go run ./cmd/worker

  web:
    image: node:22
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://api:8080
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  go_mod_cache:
  go_build_cache:
  web_node_modules:
